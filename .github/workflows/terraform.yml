name: 'Terraform CI/CD Pipeline'

on:
  push:
    branches:
      - main
    paths:
      - '*.tf'
      - '*.tfvars'
      - 'modules/**'
  pull_request:
    branches:
      - main
    paths:
      - '*.tf'
      - '*.tfvars'
      - 'modules/**'

env:
  TF_VERSION: 1.5.0
  AWS_DEFAULT_REGION: us-east-1

jobs:
  terraform:
    name: 'Terraform'
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      pull-requests: write
    
    steps:
      # Checkout code
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Setup Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # Configure AWS Credentials
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_DEFAULT_REGION }}

      # Terraform Format Check
      - name: Terraform Format
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      # Terraform Init
      - name: Terraform Init
        id: init
        run: terraform init
        continue-on-error: true

      # Terraform Validate
      - name: Terraform Validate
        id: validate
        run: terraform validate
        continue-on-error: true

      # Terraform Plan (on PR)
      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -out=tfplan
        continue-on-error: true
        if: github.event_name == 'pull_request'

      # Terraform Plan Output (on PR)
      - name: Comment on PR with Plan
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = require('child_process').execSync('terraform show -no-color tfplan').toString();
            
            const output = `#### Terraform Format and Style 🖌 \`${{ steps.fmt.outcome }}\`
            #### Terraform Initialization ⚙️ \`${{ steps.init.outcome }}\`
            #### Terraform Validation 🤖 \`${{ steps.validate.outcome }}\`
            #### Terraform Plan 📖 \`${{ steps.plan.outcome }}\`
            
            <details><summary>Show Plan</summary>
            
            \`\`\`terraform
            ${plan}
            \`\`\`
            
            </details>`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

      # Terraform Apply (on main push)
      - name: Terraform Plan for Apply
        id: plan-apply
        run: terraform plan -no-color
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        continue-on-error: true

      - name: Terraform Apply
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve -no-color
        continue-on-error: false

      # Generate Summary
      - name: Create Summary
        if: always()
        run: |
          echo "## Terraform Workflow Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Format Check: ${{ steps.fmt.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "- Init: ${{ steps.init.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "- Validate: ${{ steps.validate.outcome }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "- Plan: ${{ steps.plan.outcome }}" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ github.event_name }}" == "push" ] && [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "- Apply: ${{ steps.plan-apply.outcome }}" >> $GITHUB_STEP_SUMMARY
          fi
